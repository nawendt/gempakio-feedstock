schema_version: 1

context:
  version: "1.4.4"
  python_min: "3.11"

package:
  name: gempakio
  version: ${{ version }}

source:
  url: https://github.com/nawendt/gempakio/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3bd3ae15b5f0635a816378552e99e259bfd605b9980ad219d98d1bb91a62aec1
build:
  noarch: python
  number: 1
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy
    - pandas
    - pyproj
    - xarray

tests:
  - python:
      imports:
        - gempakio
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/nawendt/gempakio
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Read and write GEMPAK file formats.
  description: |
    gempakIO is a pure-Python package that will read and write GEMPAK grid, sounding, and surface data as well as other GEMPAK file formats.
  repository: https://github.com/nawendt/gempakio
  documentation: https://github.com/nawendt/gempakio

extra:
  recipe-maintainers:
    - nawendt
